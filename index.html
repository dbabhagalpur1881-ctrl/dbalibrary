<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>District Bar Association Library, Bhagalpur</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --dark:#0a0f1c;
  --navy:#002b5c;
  --navy2:#004080;
  --cyan:#00ffe0;
  --cyan2:#00ccb4;
  --red:#e74c3c;
  --gold:#f39c12;
  --green:#00c853;
  --white:#ffffff;
  --card:#111827;
  --border:rgba(0,255,224,0.15);
  --text:#e2e8f0;
  --muted:#94a3b8;
  --radius:12px;
  --tr:0.3s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Poppins',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;line-height:1.6}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0a0f1c}
::-webkit-scrollbar-thumb{background:var(--cyan);border-radius:3px}

/* HEADER */
header{
  position:sticky;top:0;z-index:1000;
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;
  background:rgba(0,43,92,0.97);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 20px rgba(0,0,0,0.5);
}
.header-logo{
  width:48px;height:48px;border-radius:50%;
  border:2px solid var(--cyan);
  object-fit:cover;flex-shrink:0;
}
.header-text h1{font-size:0.92rem;font-weight:700;color:var(--white);line-height:1.2}
.header-text p{font-size:0.65rem;color:var(--cyan);letter-spacing:0.08em;text-transform:uppercase}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.header-right a{
  font-size:0.72rem;color:var(--cyan);
  background:rgba(0,255,224,0.08);
  border:1px solid var(--border);
  padding:5px 10px;border-radius:20px;
  text-decoration:none;transition:var(--tr);white-space:nowrap;
}
.header-right a:hover{background:var(--cyan);color:#000}

/* NAV */
nav{
  display:flex;justify-content:center;gap:4px;
  background:rgba(0,64,128,0.9);
  padding:6px 12px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);
  position:sticky;top:68px;z-index:999;
  backdrop-filter:blur(8px);
}
nav a{
  color:rgba(255,255,255,0.8);text-decoration:none;
  padding:6px 12px;border-radius:6px;font-size:0.78rem;
  font-weight:500;transition:var(--tr);
  display:flex;align-items:center;gap:4px;
}
nav a:hover,nav a.active{background:rgba(0,255,224,0.15);color:var(--cyan)}

/* HERO */
.hero{height:100svh;height:100vh;position:relative;overflow:hidden}
.hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-slide{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  opacity:0;transition:opacity 1.2s ease;
}
.hero-slide.active{opacity:1}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,10,30,0.85) 0%,rgba(0,43,92,0.7) 50%,rgba(0,20,50,0.85) 100%);
  z-index:1;
}
.hero-grid-pattern{
  position:absolute;inset:0;z-index:1;
  background-image:
    linear-gradient(rgba(0,255,224,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,224,0.03) 1px,transparent 1px);
  background-size:40px 40px;
}
.hero-content{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;z-index:2;
  width:90%;max-width:700px;
  animation:heroIn 1s ease forwards;
}
@keyframes heroIn{from{opacity:0;transform:translate(-50%,-46%)}to{opacity:1;transform:translate(-50%,-50%)}}
.hero-seal{
  width:100px;height:100px;border-radius:50%;
  border:3px solid rgba(0,255,224,0.6);
  box-shadow:0 0 30px rgba(0,255,224,0.3),0 0 60px rgba(0,255,224,0.1);
  margin:0 auto 1.2rem;
  overflow:hidden;background:#fff;
}
.hero-seal img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hero-badge{
  display:inline-block;
  border:1px solid rgba(0,255,224,0.4);
  background:rgba(0,255,224,0.08);
  color:var(--cyan);padding:4px 16px;border-radius:20px;
  font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;
  margin-bottom:1rem;
}
.hero-h1{font-size:clamp(0.9rem,3vw,1.1rem);color:var(--muted);letter-spacing:0.3em;text-transform:uppercase;margin-bottom:0.4rem}
.hero-h2{
  font-size:clamp(1.8rem,6vw,3.5rem);
  font-weight:800;color:var(--white);
  line-height:1.1;margin-bottom:0.4rem;
  text-shadow:0 0 30px rgba(0,255,224,0.3);
}
.hero-h2 span{color:var(--cyan)}
.hero-h3{font-size:clamp(1rem,3vw,1.6rem);color:var(--cyan);font-weight:600;margin-bottom:1.2rem}
.typing-wrap{display:inline-block;overflow:hidden;border-right:3px solid var(--cyan);white-space:nowrap;animation:typing 3.5s steps(20) 0.5s both,blink 0.7s step-end infinite}
@keyframes typing{from{width:0}to{width:100%}}
@keyframes blink{50%{border-color:transparent}}
.hero-tags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem}
.hero-tag{font-size:0.75rem;color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.07);padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.1)}
.hero-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-primary{
  background:var(--cyan);color:#000;
  padding:12px 28px;border-radius:8px;
  text-decoration:none;font-weight:700;
  font-size:0.88rem;letter-spacing:0.05em;
  transition:var(--tr);border:none;cursor:pointer;
  box-shadow:0 0 20px rgba(0,255,224,0.4);
}
.btn-primary:hover{background:var(--cyan2);transform:translateY(-2px);box-shadow:0 0 30px rgba(0,255,224,0.6)}
.btn-outline{
  background:transparent;color:var(--white);
  padding:12px 28px;border-radius:8px;
  border:1px solid rgba(255,255,255,0.3);
  text-decoration:none;font-weight:600;
  font-size:0.88rem;letter-spacing:0.05em;
  transition:var(--tr);cursor:pointer;
}
.btn-outline:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,255,224,0.05)}
.hero-scroll{
  position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.4);font-size:0.65rem;letter-spacing:0.15em;
  text-transform:uppercase;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  animation:scrollPulse 2s ease infinite;
}
.hero-scroll::after{content:'';width:1px;height:32px;background:linear-gradient(to bottom,rgba(0,255,224,0.4),transparent)}
@keyframes scrollPulse{0%,100%{opacity:0.4;transform:translateX(-50%) translateY(0)}50%{opacity:0.8;transform:translateX(-50%) translateY(6px)}}

/* STATS BAR */
.stats-bar{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  background:var(--navy);
  border-bottom:1px solid var(--border);
}
.stat-item{
  padding:1.2rem 1rem;text-align:center;
  border-right:1px solid var(--border);
  transition:var(--tr);
}
.stat-item:last-child{border-right:none}
.stat-item:hover{background:rgba(0,255,224,0.05)}
.stat-num{font-size:1.6rem;font-weight:800;color:var(--cyan);line-height:1}
.stat-lbl{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:2px}

/* SECTION */
.section{padding:3.5rem 0}
.container{max-width:1100px;margin:0 auto;padding:0 1rem}
.sec-label{font-size:0.72rem;color:var(--cyan);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:0.3rem}
.sec-title{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--white);margin-bottom:0.4rem}
.sec-divider{width:48px;height:3px;background:linear-gradient(90deg,var(--cyan),var(--cyan2));border-radius:2px;margin-bottom:1.8rem}

/* RESOURCES */
#resources{background:var(--card)}
.resource-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-top:1.5rem}
.resource-card{
  background:#1a2236;border:1px solid var(--border);
  border-radius:var(--radius);padding:1.5rem 1.2rem;
  text-decoration:none;color:var(--text);
  transition:var(--tr);text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:0.6rem;
}
.resource-card:hover{border-color:var(--cyan);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,255,224,0.1)}
.resource-icon{font-size:1.8rem}
.resource-name{font-size:0.88rem;font-weight:600;color:var(--white)}
.resource-desc{font-size:0.72rem;color:var(--muted)}

/* FILTER TABS */
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.2rem;align-items:center}
.ftab{
  padding:7px 16px;border-radius:20px;
  border:1px solid var(--border);
  background:transparent;color:var(--muted);
  font-size:0.78rem;font-weight:600;cursor:pointer;
  transition:var(--tr);font-family:'Poppins',sans-serif;
  letter-spacing:0.03em;
}
.ftab:hover{border-color:var(--cyan);color:var(--cyan)}
.ftab.active{background:var(--cyan);border-color:var(--cyan);color:#000}
.ftab.air.active{background:var(--red);border-color:var(--red);color:#fff}
.search-box{
  position:relative;flex:1;min-width:200px;max-width:380px;
}
.search-box svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--muted)}
.search-box input{
  width:100%;padding:8px 12px 8px 34px;
  background:#1a2236;border:1px solid var(--border);
  border-radius:8px;color:var(--white);
  font-family:'Poppins',sans-serif;font-size:0.83rem;
  outline:none;transition:var(--tr);
}
.search-box input:focus{border-color:var(--cyan)}
.search-box input::placeholder{color:var(--muted)}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:0.8rem}
thead{background:var(--navy)}
thead th{
  padding:11px 10px;text-align:left;
  font-weight:600;color:var(--cyan);
  letter-spacing:0.04em;font-size:0.75rem;
  white-space:nowrap;border-bottom:1px solid var(--border);
}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:var(--tr)}
tbody tr:hover{background:rgba(0,255,224,0.04)}
tbody td{padding:9px 10px;vertical-align:middle;white-space:nowrap}
.acc-badge{
  font-family:'Courier New',monospace;
  font-size:0.72rem;color:var(--cyan);
  background:rgba(0,255,224,0.08);
  padding:2px 6px;border-radius:4px;
  border:1px solid rgba(0,255,224,0.15);
}
.cond-badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:0.68rem;font-weight:600;
}
.cond-new{background:rgba(0,200,83,0.15);color:#00c853;border:1px solid rgba(0,200,83,0.3)}
.cond-good{background:rgba(0,255,224,0.1);color:var(--cyan);border:1px solid rgba(0,255,224,0.25)}
.cond-fair{background:rgba(243,156,18,0.12);color:var(--gold);border:1px solid rgba(243,156,18,0.3)}
.cond-poor{background:rgba(231,76,60,0.12);color:var(--red);border:1px solid rgba(231,76,60,0.3)}
.cond-critical{background:rgba(180,0,0,0.2);color:#ff6b6b;border:1px solid rgba(255,0,0,0.3)}
.status-avail{display:inline-block;background:rgba(0,200,83,0.15);color:#00c853;border:1px solid rgba(0,200,83,0.3);padding:2px 8px;border-radius:10px;font-size:0.68rem;font-weight:700}
.status-rest{display:inline-block;background:rgba(231,76,60,0.15);color:var(--red);border:1px solid rgba(231,76,60,0.3);padding:2px 8px;border-radius:10px;font-size:0.68rem;font-weight:700}
.tbl-note{margin-top:0.8rem;font-size:0.72rem;color:var(--muted);font-style:italic}
.tbl-note::before{content:'ℹ ';font-style:normal}
#noResults{display:none;padding:2rem;text-align:center;color:var(--muted)}
.tbl-count{font-size:0.75rem;color:var(--muted);margin-left:auto;align-self:center}

/* ISSUE FORM */
#issue{background:var(--card)}
.form-wrap{
  background:#1a2236;border:1px solid var(--border);
  border-radius:var(--radius);padding:2rem 1.8rem;
  max-width:720px;
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.fgroup{display:flex;flex-direction:column;gap:5px}
.fgroup.full{grid-column:1/-1}
.fgroup label{font-size:0.73rem;font-weight:600;color:var(--cyan);letter-spacing:0.08em;text-transform:uppercase}
.fgroup input,.fgroup select,.fgroup textarea{
  padding:10px 12px;
  background:#0d1526;border:1px solid var(--border);
  border-radius:8px;color:var(--white);
  font-family:'Poppins',sans-serif;font-size:0.88rem;
  outline:none;transition:var(--tr);
}
.fgroup input:focus,.fgroup select:focus,.fgroup textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,255,224,0.1)}
.fgroup select option{background:#0d1526}
.fgroup textarea{min-height:80px;resize:vertical}
.success-msg{
  display:none;
  background:rgba(0,200,83,0.12);
  border:1px solid rgba(0,200,83,0.3);
  border-left:4px solid var(--green);
  color:#a7f3d0;padding:1rem 1.2rem;
  border-radius:8px;margin-top:1rem;
  font-size:0.85rem;
  align-items:flex-start;gap:0.6rem;
}
.success-msg.show{display:flex}
@media(max-width:580px){
  .form-grid{grid-template-columns:1fr}
  .fgroup.full{grid-column:1}
  .form-wrap{padding:1.3rem 1rem}
}

/* AI TOOLS */
#aitools{background:var(--dark)}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:1.5rem}
.ai-card{
  background:#1a2236;border:1px solid var(--border);
  border-radius:var(--radius);padding:1.5rem;
}
.ai-card h3{font-size:0.95rem;font-weight:700;color:var(--cyan);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.ai-input{
  width:100%;padding:9px 12px;
  background:#0d1526;border:1px solid var(--border);
  border-radius:8px;color:var(--white);
  font-family:'Poppins',sans-serif;font-size:0.83rem;
  outline:none;transition:var(--tr);margin-bottom:8px;
}
.ai-input:focus{border-color:var(--cyan)}
textarea.ai-input{min-height:100px;resize:vertical}
.ai-result{
  margin-top:8px;padding:10px;
  background:#0d1526;border:1px solid var(--border);
  border-radius:8px;font-size:0.8rem;
  min-height:60px;color:var(--text);
  display:none;
}
.ai-result.show{display:block}
@media(max-width:640px){.ai-grid{grid-template-columns:1fr}}

/* GALLERY */
#gallery{background:var(--card)}
.gallery-upload{display:flex;gap:10px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.gallery-upload input[type=file]{
  flex:1;padding:8px;background:#1a2236;
  border:1px dashed var(--border);border-radius:8px;
  color:var(--muted);font-family:'Poppins',sans-serif;font-size:0.8rem;
}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.gallery-grid img{
  width:100%;height:110px;object-fit:cover;
  border-radius:10px;border:1px solid var(--border);
  transition:var(--tr);cursor:pointer;
}
.gallery-grid img:hover{transform:scale(1.03);border-color:var(--cyan)}
.gallery-empty{text-align:center;color:var(--muted);font-size:0.8rem;padding:2rem;grid-column:1/-1}

/* HOLIDAYS */
#holidays{background:var(--dark)}
.cal-wrap{
  background:#1a2236;border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  margin-bottom:2rem;
}
.cal-header{
  background:var(--navy);padding:12px 16px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border);
}
.cal-header svg{width:16px;height:16px;stroke:var(--cyan)}
.cal-header span{font-size:0.78rem;font-weight:600;color:var(--cyan);letter-spacing:0.08em;text-transform:uppercase}
.cal-iframe-box{position:relative;width:100%;padding-top:60%;background:#0d1526}
@media(max-width:600px){.cal-iframe-box{padding-top:95%}}
.cal-iframe-box iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.cal-placeholder{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;text-align:center;padding:1.5rem;
  background:#0d1526;
}
.cal-placeholder h4{color:var(--white);font-size:0.9rem}
.cal-placeholder p{color:var(--muted);font-size:0.76rem;max-width:300px;line-height:1.6}
.cal-code{font-size:0.7rem;background:rgba(0,255,224,0.07);color:var(--cyan);padding:4px 10px;border-radius:4px;font-family:'Courier New',monospace;border:1px solid var(--border)}
.holiday-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem}
.hol-card{
  background:#1a2236;border:1px solid var(--border);
  border-left:4px solid var(--cyan);
  border-radius:var(--radius);padding:1rem 1.1rem;
  display:flex;align-items:center;gap:1rem;
  transition:var(--tr);
}
.hol-card:nth-child(2){border-left-color:var(--red)}
.hol-card:nth-child(3){border-left-color:var(--gold)}
.hol-card:nth-child(4){border-left-color:var(--green)}
.hol-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.hol-date{
  background:var(--navy);border-radius:8px;
  min-width:50px;text-align:center;padding:8px 6px;flex-shrink:0;
}
.hol-card:nth-child(2) .hol-date{background:rgba(231,76,60,0.2)}
.hol-card:nth-child(3) .hol-date{background:rgba(243,156,18,0.2)}
.hol-card:nth-child(4) .hol-date{background:rgba(0,200,83,0.15)}
.hol-day{display:block;font-size:1.2rem;font-weight:800;color:var(--white);line-height:1}
.hol-month{display:block;font-size:0.6rem;color:var(--cyan);text-transform:uppercase;letter-spacing:0.08em}
.hol-name{font-size:0.88rem;font-weight:700;color:var(--white);display:block}
.hol-type{font-size:0.68rem;color:var(--muted);margin-top:2px;display:block}

/* ABOUT */
#about{background:var(--card)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:2.5rem;align-items:center}
@media(max-width:680px){.about-grid{grid-template-columns:1fr}}
.about-text p{color:var(--muted);font-size:0.88rem;line-height:1.9;margin-bottom:0.8rem}
.about-text p strong{color:var(--white)}
.about-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
.astat{
  background:#1a2236;border:1px solid var(--border);
  border-top:3px solid var(--cyan);
  border-radius:var(--radius);padding:1.2rem 1rem;text-align:center;
  transition:var(--tr);
}
.astat:nth-child(2){border-top-color:var(--red)}
.astat:nth-child(3){border-top-color:var(--gold)}
.astat:nth-child(4){border-top-color:var(--green)}
.astat:hover{transform:translateY(-3px)}
.astat-num{font-size:1.6rem;font-weight:800;color:var(--cyan);display:block;line-height:1}
.astat-lbl{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:3px;display:block}

/* CONTACT */
#contact{background:var(--dark)}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-top:1.8rem}
.contact-card{
  background:#1a2236;border:1px solid var(--border);
  border-radius:var(--radius);padding:1.2rem;
  display:flex;align-items:flex-start;gap:0.9rem;
  transition:var(--tr);
}
.contact-card:hover{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,255,224,0.07)}
.contact-icon{
  width:40px;height:40px;border-radius:8px;
  background:rgba(0,255,224,0.1);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.contact-icon svg{width:18px;height:18px;stroke:var(--cyan)}
.contact-lbl{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:3px;display:block}
.contact-val a,.contact-val span{font-size:0.85rem;color:var(--text);text-decoration:none;font-weight:500}
.contact-val a:hover{color:var(--cyan)}

/* FOOTER */
footer{
  background:#000;text-align:center;
  padding:1.8rem 1rem;border-top:1px solid var(--border);
}
footer p{font-size:0.78rem;color:var(--muted);line-height:1.9}
footer strong{color:var(--white)}
.footer-divider{width:40px;height:1px;background:rgba(0,255,224,0.2);margin:0.7rem auto}

/* FLOAT BUTTONS */
.float-wa{
  position:fixed;bottom:80px;right:18px;z-index:998;
  width:50px;height:50px;border-radius:50%;
  background:#25d366;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 15px rgba(37,211,102,0.5);
  text-decoration:none;transition:var(--tr);
  animation:floatPop 3s ease infinite;
}
.float-tg{
  position:fixed;bottom:140px;right:18px;z-index:998;
  width:50px;height:50px;border-radius:50%;
  background:#229ed9;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 15px rgba(34,158,217,0.5);
  text-decoration:none;transition:var(--tr);
}
.float-wa:hover,.float-tg:hover{transform:scale(1.1)}
.float-wa svg,.float-tg svg{width:26px;height:26px;fill:white}
